set -g pane-border-lines "double"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

setw -g mode-keys vi
setw -g status-keys vi

set -g mouse on

set -s escape-time 0

set -g history-limit 10000

# set -g set-clipboard external

bind -n M-r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind -n M-s choose-tree -s

# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard || wl-copy 2>/dev/null"
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -selection clipboard -i"

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

bind -n M-/ copy-mode \; command-prompt -p "(search down)" "send -X search-forward '%%%'"
bind -n M-? copy-mode \; command-prompt -p "(search up)"   "send -X search-backward '%%%'"
