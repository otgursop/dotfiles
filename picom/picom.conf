# backend = "glx";
# glx-no-stencil = true;
# glx-copy-from-front = false;
# glx-no-rebind-pixmap = true;
# use-damage = false;

# ROUNDED CORNERS
corner-radius = 0

# BLURRING
# methods: none, gaussian, box, kernel (define custom kernel), dual_kawase
# blur:
# {
  # method = "dual_kawase";
  # size = 10;
  # strength = 3;
# default deviation is 0.84
# deviation = false;
# };

# semi-transparent
# blur-background = true

# blur-background-frame = true
# Use fixed blur strength rather than adjusting according to window opacity.
# blur-background-fixed = true

# set custom blur kernel (method to kernel), preset examples:
# blur-kern = "3x3box";
# blur-kern = "5x5gaussian";


# SHADOWS
# shadow = true; # this allows me to toggle on shadows solely for qutebrowser, to create a muted/blurred look behind tabs when combined with qutebrowser's transparent tabs setting.
shadow-radius = 1; # blur radius
shadow-opacity = 0.6

shadow-offset-x = 0;
shadow-offset-y = 0;

# shadow-color = "#000000"
shadow-color = "#393943" # this could be set with a pywal template instead
# shadow-exclude = [];


# FADING
fading = false;

fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 3;


# OTHER SETTINGS
# dbus = true
# daemon = false

# backends: `xrender`, `glx`, `egl` or `xr_glx_hybrid`
backend = "glx";

dithered-present = false;
vsync = true;

unredir-if-possible = true;

# mark-wmwin-focused = true;

# mark-ovredir-focused = true;

detect-rounded-corners = false;
detect-client-opacity = true;
use-ewmh-active-win = true;
detect-transient = true;
# glx-no-stencil = true
use-damage = true;
log-level = "warn";

