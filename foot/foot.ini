[main]
# Shell to launch
# shell=$SHELL # Default shell

# TERM value
term=foot
app-id=foot

# Font settings
font=JetBrainsMono Nerd Font:pixelsize=17:style=Medium
font-bold=JetBrainsMono Nerd Font:pixelsize=17:style=Bold
font-italic=JetBrainsMono Nerd Font:pixelsize=17:slant=italic
font-bold-italic=JetBrainsMono Nerd Font:pixelsize=17:weight=bold:slant=italic

# Zoom step size
font-size-adjustment=0.5

# Spacing
line-height=17
letter-spacing=0
horizontal-letter-offset=0
vertical-letter-offset=0

# Rendering
gamma-correct-blending=no
uppercase-regex-insert=yes
box-drawings-uses-font-glyphs=yes

# DPI awareness — 'yes' or 'no'
dpi-aware=yes

# pad = 0x0 center - auto
pad=5x10
#center

# Window resizing
resize-delay-ms=25
resize-by-cells=yes
resize-keep-grid=yes

# Color theme — use '1' or '2'
# Your [colors] section will still be used regardless.
# include=/usr/share/foot/themes/gruvbox-dark
# initial-color-theme=1

# Window
# initial-window-size-pixels=700x500
initial-window-mode=windowed
title=foot
locked-title=no
app-id=foot
bold-text-in-bright=no
word-delimiters=,│`|:"'()[]{}<>

# Selection
selection-target=primary

# Workers — 'auto' not allowed; must be integer 0-65535
workers=4

# utmp helper
# utmp-helper=/usr/bin/utempter


[environment]
# Define custom environment variables here if needed.
# Example: EDITOR=nvim


[security]
# OSC-52 clipboard — only allowed: disabled, copy-enabled, paste-enabled, enabled
osc52=copy-enabled


[bell]
# Bell behavior
system=yes
urgent=no
notify=no
visual=no
# 'command=' with no value causes error — removed
# command=
command-focused=no


[desktop-notifications]
# Notification command — DO NOT leave 'close=' empty
command=notify-send --wait --app-name ${app-id} --icon ${app-id} --category ${category} --urgency ${urgency} --expire-time ${expire-time} --hint STRING:image-path:${icon} --hint BOOLEAN:suppress-sound:${muted} --hint STRING:sound-name:${sound-name} --replace-id ${replace-id} ${action-argument} --print-id -- ${title} ${body}

command-action-argument=--action ${action-name}=${action-label}

# Must not be empty — set to 'none' if unused
close=none

inhibit-when-focused=yes


[scrollback]
lines=1200
multiplier=3.0
indicator-position=relative


[url]
launch=xdg-open ${url}
osc8-underline=url-mode
label-letters=sadfjklewcmpgh

regex=(((https?://|mailto:|ftp://|file:|ssh:|ssh://|git://|tel:|magnet:|ipfs://|ipns://|gemini://|gopher://|news:)|www.)([0-9a-zA-Z:/?#@!$&*+,;=.~_%^-]+|([]["0-9a-zA-Z:/?#@!$&'*+,;=.~_%^-]*)|[[()"0-9a-zA-Z:/?#@!$&'*+,;=.~_%^-]*]|"[][()0-9a-zA-Z:/?#@!$&'*+,;=.~_%^-]*"|'[][()0-9a-zA-Z:/?#@!$&*+,;=.~_%^-]*')+([0-9a-zA-Z/#@$&*+=~_%^-]|([]["0-9a-zA-Z:/?#@!$&'*+,;=.~_%^-]*)|[[()"0-9a-zA-Z:/?#@!$&'*+,;=.~_%^-]*]|"[][()0-9a-zA-Z:/?#@!$&'*+,;=.~_%^-]*"|'[][()0-9a-zA-Z:/?#@!$&*+,;=.~_%^-]*'))


[regex]
# Define custom regex here if needed.
# Example:
# [regex:hashes]
# regex=([a-fA-F0-9]{7,128})
# launch=echo ${match}


[cursor]
style=block
unfocused-style=unchanged
blink=no
blink-rate=500
beam-thickness=1.5
# 'underline-thickness=' with no value causes error — removed
# underline-thickness=


[mouse]
hide-when-typing=no
alternate-scroll-mode=yes


[touch]
long-press-delay=400


[colors-dark]
#fbf1c7
foreground = ebdbb2
background = 282828

regular0 = 32302f
regular1 = cc241d
regular2 = 98971a
regular3 = d79921
regular4 = 458588
regular5 = b16286
regular6 = 689d6a
regular7 = a89984

bright0 = 928374
bright1 = fb4934
bright2 = b8bb26
bright3 = fabd2f
bright4 = 83a598
bright5 = d3869b
bright6 = 8ec07c
bright7 = ebdbb2

# Transparency
alpha=1
alpha-mode=default

# Selection
selection-foreground = d5c4a1
selection-background = 504945

# Jump labels — MUST use HEX, not 'regular0'
jump-labels=242424 e3c401

# Scrollback indicator — MUST use HEX
scrollback-indicator=C56619 C56619

# Search box — MUST use HEX
search-box-no-match=242424 f62b5a
search-box-match=242424 e3c401

# URL underline — MUST use HEX
urls=e3c401

# Flash on bell
flash=7f7f00
flash-alpha=0.5

[csd]
preferred=none
size=26
# color=1e1e1e
# font=JetBrainsMono Nerd Font:size=10
hide-when-maximized=no
double-click-to-maximize=yes
border-width=0
# border-color=333333
button-width=26
# button-color=222222
# button-minimize-color=44aa44
# button-maximize-color=aaaa44
# button-close-color=aa4444


[key-bindings]
scrollback-up-page=Shift+Page_Up Shift+KP_Page_Up
scrollback-down-page=Shift+Page_Down Shift+KP_Page_Down

clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
primary-paste=Shift+Insert

search-start=Control+Shift+r

font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0

spawn-terminal=Control+Shift+n
show-urls-launch=Control+Shift+o
show-urls-copy=Control+Shift+i
quit=Control+Shift+q


[search-bindings]
cancel=Control+g Control+c Escape
commit=Return KP_Enter

find-prev=Control+r
find-next=Control+s

cursor-left=Left Control+b
cursor-right=Right Control+f
cursor-home=Home Control+a
cursor-end=End Control+e

delete-prev=BackSpace
delete-next=Delete

clipboard-paste=Control+v Control+y Control+Shift+v XF86Paste
primary-paste=Shift+Insert


[url-bindings]
cancel=Control+g Control+c Control+d Escape
toggle-url-visible=t


[text-bindings]
# Example: \x1b[A=Mod4+k


[mouse-bindings]
selection-override-modifiers=Shift
scrollback-up-mouse=BTN_WHEEL_BACK
scrollback-down-mouse=BTN_WHEEL_FORWARD
select-begin=BTN_LEFT
select-begin-block=Control+BTN_LEFT
select-word=BTN_LEFT-2
select-word-whitespace=Control+BTN_LEFT-2
select-row=BTN_LEFT-4
select-extend=BTN_RIGHT
select-extend-character-wise=Control+BTN_RIGHT
primary-paste=BTN_MIDDLE
font-increase=Control+BTN_WHEEL_BACK
font-decrease=Control+BTN_WHEEL_FORWARD


[tweak]
scaling-filter=bilinear #lanczos3
overflowing-glyphs=yes
render-timer=none
box-drawing-base-thickness=0.04
box-drawing-solid-shades=yes
delayed-render-lower=500000
delayed-render-upper=8333333
damage-whole-window=no
grapheme-shaping=yes
grapheme-width-method=double-width
font-monospace-warn=yes
max-shm-pool-size-mb=512
sixel=yes
dim-amount=1.5
bold-text-in-bright-amount=1.3
surface-bit-depth=auto
min-stride-alignment=256
